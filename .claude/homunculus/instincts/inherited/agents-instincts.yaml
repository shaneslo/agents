# Agents Workflow Conductor Spec And Plan Update

## Action

Follow the conductor-spec-and-plan-update workflow:
1. Edit or add .conductor/tracks/<track-name>/spec.md to define or update functional requirements, acceptance criteria, and risk register.
2. Edit or add .conductor/tracks/<track-name>/plan.md to outline or revise the implementation phases, tasks, and checkpoints.
3. Optionally, edit .conductor/product.md to update the overall product vision or scope.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .conductor/tracks/*/spec.md, .conductor/tracks/*/plan.md, .conductor/product.md

